<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCash - Dashboard Financeiro</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Smart<span>Cash</span></h1>
        <p>Seu Dashboard Financeiro Inteligente</p>
    </header>

    <main class="container">
        <!--Camada 2: Indicadores-->
        <section id="balance">
            <h2 class="sr-only">Balanço</h2>

            <div class="card">
                <h3>
                    <span>Entradas</span>
                    <img src="assets/img/income.svg" alt="Ícone de Entradas" onerror="this.style.display='none'">
                </h3>
                <p id="incomeDisplay">R$ 0,00</p>
            </div>

            <div class="card">
                <h3>
                    <span>Saídas</span>
                    <img src="assets/img/expense.svg" alt="Ícone de Saídas" onerror="this.style.display='none'">
                </h3>
                <p id="expenseDisplay">R$ 0,00</p>
            </div>

            <div class="card total">
                <h3>
                    <span>Total</span>
                    <img src="assets/img/total.svg" alt="Ícone de Total" onerror="this.style.display='none'">
                </h3>
                <p id="totalDisplay">R$ 0,00</p>
            </div>
        </section>

        <!--Camada 2: Área de Cadastro-->
        <section id="transaction-form">
            <h2>Nova Transação</h2>
            <form id="form">
                <div class="input-group">
                    <label for="description" class="sr-only">Descrição</label>
                    <input type="text" id="description" name="description" placeholder="Aluguel, Salário, Plano de Saúde, Compras" required>                    
                </div>

                <div class="input-group">
                    <label for="amount" class="sr-only">Valor</label>
                    <input type="number" step="0.01" id="amount" name="amount" placeholder="0,00" required>
                    <small>Use o sinal - (negativo) para despesas.</small>
                </div>

                <div class="input-group">
                    <label for="category" class="sr-only">Categoria</label>
                    <select id="category"  name="category" required>
                        <option value="" disabled selected>Selecione uma categoria</option>
                        <option value="Lazer">Lazer</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Saúde">Saúde</option>
                        <option value="Moradia">Moradia</option>
                        <option value="Trabalho">Trabalho</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>

                <div class="actions">
                    <button type="submit">Salvar Transação</button>
                </div>
            </form>
        </section>

        <!--Camada 2: Visualização de Dados-->
        <section id="data-display">
            <h2>Movimentações</h2>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Categoria</th>
                        <th>Data</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Injeção de Dados (DOM)-->
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - SmartCash</p>
    </footer>

    <!-- Scripts por ordem de dependência -->
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/dom.js"></script>
    <script src="assets/js/script.js"></script>    
</body>
</html>
